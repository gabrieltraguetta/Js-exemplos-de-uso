<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 5b: Troca de Imagem</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    .image-container {
      text-align: center;
    }

    img {
      width: 200px;
      height: 200px;
      border: 2px solid black;
      border-radius: 10px;
      transition: transform 0.3s ease;
    }

    img:hover {
      transform: scale(1.05);
    }

    #myText {
      margin-top: 20px;
      font-size: 1.5em;
      font-weight: bold;
      color: #333;
    }

    .subtext {
      margin-top: 10px;
      font-size: 1.2em;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="image-container">
    <img id="myImage" src="image.png" alt="Imagem 1">

    <p id="myText">Passe o mouse sobre a imagem</p>

    <p class="subtext" id="subText">Sabrina Carpenter - Linda!</p>
  </div>

  <script>

    // Selecionando os elementos
    const imagem = document.getElementById("myImage");
    const texto = document.getElementById("myText");
    const subTexto = document.getElementById("subText");

    // Quando passar o mouse
    imagem.addEventListener("mouseover", function() {
      imagem.src = "image2.png";
      texto.textContent = "A imagem foi alterada!";
      subTexto.textContent = "Nova imagem exibida com sucesso!";
    });

    // Quando tirar o mouse
    imagem.addEventListener("mouseout", function() {
      imagem.src = "image.png";
      texto.textContent = "Passe o mouse sobre a imagem";
      subTexto.textContent = "Sabrina Carpenter - Linda!";
    });

  </script>

</body>
</html>
